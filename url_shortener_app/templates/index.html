<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">URL Shortener</h2>

        <form method="POST">
            <input type="text" name="url" class="form-control mb-3" placeholder="Enter your URL" required>
            <button class="btn btn-primary w-100">Shorten URL</button>
        </form>

        {% if error %}
            <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        {% if short_url %}
            <div class="mt-3">
                <label>Short URL</label>
                <div class="input-group">
                    <input type="text" id="shortUrl" class="form-control" value="{{ short_url }}" readonly>
                    <button class="btn btn-success" onclick="copyURL()">Copy</button>
                </div>
            </div>
        {% endif %}

        <a href="/history" class="btn btn-link mt-3">View History</a>
    </div>
</div>

<script>
function copyURL() {
    let copyText = document.getElementById("shortUrl");
    copyText.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
