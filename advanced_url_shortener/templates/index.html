<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">

<nav class="navbar navbar-dark bg-black">
  <div class="container-fluid">
    <span class="navbar-brand">Advanced URL Shortener</span>
    <div>
      <a href="/history" class="btn btn-outline-light btn-sm">History</a>
      <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-lg p-4" style="width: 28rem;">
        <h3 class="text-center mb-3">Shorten Your URL</h3>

        <form method="POST">
            <input type="text" name="url" class="form-control mb-3" placeholder="Enter URL" required>
            <button class="btn btn-primary w-100">Shorten URL</button>
        </form>

        {% if short_url %}
        <div class="mt-3">
            <label>Short URL</label>
            <input type="text" value="{{ short_url }}" id="shortUrl" class="form-control mb-2" readonly>
            <button class="btn btn-success w-100" onclick="copyURL()">Copy</button>
        </div>
        {% endif %}

        {% with messages = get_flashed_messages() %}
        {% for msg in messages %}
            <div class="alert alert-danger mt-2">{{ msg }}</div>
        {% endfor %}
        {% endwith %}
    </div>
</div>

<script>
function copyURL() {
    var copyText = document.getElementById("shortUrl");
    copyText.select();
    document.execCommand("copy");
    alert("Copied: " + copyText.value);
}
</script>

</body>
</html>
