<!DOCTYPE html>
<html>
<head>
    <title>Regex Matcher</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }

        .container {
            width: 500px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
        }

        .result ul {
            padding-left: 20px;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Regex Matcher App</h2>

    <form method="POST">
        <label>Test String</label>
        <textarea name="test_string" rows="4" placeholder="Enter your test string..." required></textarea>

        <label>Regex Pattern</label>
        <input type="text" name="regex_pattern" placeholder="Enter regex..." required>

        <button type="submit">Find Matches</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if matches %}
        <div class="result">
            <h3>Matched Strings:</h3>
            <ul>
                {% for match in matches %}
                    <li>{{ match }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}

    <footer>Built with Flask & Regex</footer>
</div>

</body>
</html>
